# =============================================================================
# YUGI-AI — Production NGINX Configuration
# =============================================================================
# Reverse proxy handling:
#   - HTTP → HTTPS redirect (when SSL is enabled)
#   - Static file caching for Next.js assets
#   - WebSocket upgrade for Socket.IO
#   - Security headers (HSTS, CSP, X-Frame-Options)
#   - Gzip compression
#   - Rate limiting at edge layer
#   - Request buffering and proxy timeouts
# =============================================================================

# Worker processes: auto-detect based on CPU cores
worker_processes auto;

# Maximum number of open files per worker
worker_rlimit_nofile 8192;

# Error log location and level
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    # Maximum simultaneous connections per worker
    worker_connections 4096;

    # Use epoll for Linux (high-performance event model)
    use epoll;

    # Accept multiple connections at once
    multi_accept on;
}

http {
    # =========================================================================
    # Core Settings
    # =========================================================================
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Efficient file serving
    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    # Timeouts
    keepalive_timeout   65;
    client_body_timeout 30s;
    client_header_timeout 30s;
    send_timeout 30s;

    # Request size limits
    # 10MB max body size — covers file uploads in future phases
    client_max_body_size 10M;

    # Buffer sizes
    client_body_buffer_size    128k;
    client_header_buffer_size  4k;
    large_client_header_buffers 4 16k;

    # =========================================================================
    # Logging — Structured JSON format for log aggregation
    # =========================================================================
    log_format json_combined escape=json
        '{'
            '"time": "$time_iso8601",'
            '"remote_addr": "$remote_addr",'
            '"request_method": "$request_method",'
            '"request_uri": "$request_uri",'
            '"status": $status,'
            '"body_bytes_sent": $body_bytes_sent,'
            '"request_time": $request_time,'
            '"http_referer": "$http_referer",'
            '"http_user_agent": "$http_user_agent",'
            '"upstream_response_time": "$upstream_response_time",'
            '"upstream_addr": "$upstream_addr"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    # =========================================================================
    # Gzip Compression
    # Compress text-based responses to reduce bandwidth.
    # =========================================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/woff2;

    # =========================================================================
    # Rate Limiting Zones
    # First line of defense against brute force and abuse.
    # Application-level rate limiting (Redis) provides granular per-endpoint control.
    # =========================================================================

    # General API: 30 requests/second per IP
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;

    # Auth endpoints: 5 requests/minute per IP (strict)
    limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/m;

    # WebSocket connections: 10 per minute per IP
    limit_req_zone $binary_remote_addr zone=ws_connect:10m rate=10r/m;

    # =========================================================================
    # Upstream Definitions
    # =========================================================================
    upstream frontend {
        server frontend:3000;
        keepalive 32;
    }

    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    # =========================================================================
    # HTTP Server — Redirect to HTTPS (when SSL is enabled)
    # =========================================================================
    # Uncomment this block when SSL certificates are configured:
    # server {
    #     listen 80;
    #     server_name _;
    #     return 301 https://$host$request_uri;
    # }

    # =========================================================================
    # Main Server Block
    # =========================================================================
    server {
        listen 80;
        # listen 443 ssl http2;  # Uncomment when SSL is configured
        server_name _;

        # =====================================================================
        # SSL Configuration (uncomment when certificates are available)
        # =====================================================================
        # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        # ssl_protocols       TLSv1.2 TLSv1.3;
        # ssl_ciphers         HIGH:!aNULL:!MD5:!RC4;
        # ssl_prefer_server_ciphers on;
        # ssl_session_cache   shared:SSL:10m;
        # ssl_session_timeout 10m;
        # ssl_session_tickets off;

        # =====================================================================
        # Security Headers
        # Applied to every response from NGINX.
        # =====================================================================

        # Prevent clickjacking
        add_header X-Frame-Options "SAMEORIGIN" always;

        # Prevent MIME type sniffing
        add_header X-Content-Type-Options "nosniff" always;

        # XSS protection (legacy browsers)
        add_header X-XSS-Protection "1; mode=block" always;

        # Referrer policy — send origin only for cross-origin requests
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Permissions policy — restrict browser features
        add_header Permissions-Policy "camera=(), microphone=(self), geolocation=()" always;

        # HSTS — enforce HTTPS (uncomment when SSL is active)
        # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Content Security Policy
        # Restrictive by default; adjust as needed for third-party integrations
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://api.dicebear.com; connect-src 'self' ws: wss:; frame-ancestors 'self';" always;

        # =====================================================================
        # API Routes — Proxy to FastAPI backend
        # =====================================================================
        location /api/ {
            limit_req zone=api_general burst=20 nodelay;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            # Timeouts for AI responses (can be long)
            proxy_read_timeout 120s;
            proxy_send_timeout 30s;
            proxy_connect_timeout 10s;

            # Buffering for API responses
            proxy_buffering on;
            proxy_buffer_size 8k;
            proxy_buffers 8 32k;
        }

        # Auth-specific rate limiting (stricter)
        location /api/v1/auth/ {
            limit_req zone=api_auth burst=3 nodelay;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            proxy_read_timeout 30s;
            proxy_send_timeout 10s;
            proxy_connect_timeout 5s;
        }

        # =====================================================================
        # WebSocket — Proxy to FastAPI Socket.IO
        # Handles connection upgrade from HTTP to WebSocket.
        # =====================================================================
        location /ws/ {
            limit_req zone=ws_connect burst=5 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;

            # WebSocket upgrade headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket timeout — keep connections alive
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;

            # Disable buffering for real-time streaming
            proxy_buffering off;
        }

        # Socket.IO specific path
        location /socket.io/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_buffering off;
        }

        # =====================================================================
        # Next.js Static Assets — Cache aggressively
        # Hashed filenames enable long-term caching.
        # =====================================================================
        location /_next/static/ {
            proxy_pass http://frontend;

            # Long-term caching — Next.js hashes filenames, so immutable is safe.
            # Cache-Control header tells browsers to cache for 1 year.
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # =====================================================================
        # Frontend — All remaining routes
        # Proxies to Next.js for server-side rendering.
        # =====================================================================
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 30s;
            proxy_send_timeout 10s;
            proxy_connect_timeout 5s;

            # No cache for HTML pages (SSR content changes)
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # =====================================================================
        # Health Check Endpoint (for load balancers)
        # =====================================================================
        location /nginx-health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # =====================================================================
        # Block access to hidden files
        # =====================================================================
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
