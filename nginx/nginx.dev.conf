# =============================================================================
# YUGI-AI — Development NGINX Configuration
# =============================================================================
# Simplified configuration for local development:
#   - No SSL
#   - No caching (for hot reload compatibility)
#   - Relaxed rate limits
#   - Verbose logging
#
# Used only when testing the full stack locally with NGINX.
# During normal development, access frontend/backend directly.
# =============================================================================

worker_processes 1;
error_log /var/log/nginx/error.log debug;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Allow larger bodies during development (file uploads, etc.)
    client_max_body_size 50M;

    # Human-readable access log for development
    log_format dev '$remote_addr - $remote_user [$time_local] '
                   '"$request" $status $body_bytes_sent '
                   '"$http_referer" "$http_user_agent" '
                   'upstream=$upstream_response_time';

    access_log /var/log/nginx/access.log dev;

    # =========================================================================
    # Upstream Definitions
    # =========================================================================
    upstream frontend {
        server frontend:3000;
    }

    upstream backend {
        server backend:8000;
    }

    # =========================================================================
    # Development Server
    # =========================================================================
    server {
        listen 80;
        server_name localhost;

        # -----------------------------------------------------------------
        # API Routes
        # -----------------------------------------------------------------
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            # Generous timeout for debugging
            proxy_read_timeout 300s;
            proxy_send_timeout 60s;
            proxy_connect_timeout 30s;
        }

        # -----------------------------------------------------------------
        # WebSocket
        # -----------------------------------------------------------------
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_buffering off;
        }

        location /socket.io/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_buffering off;
        }

        # -----------------------------------------------------------------
        # Next.js Hot Module Replacement (HMR)
        # Must not be cached or buffered.
        # -----------------------------------------------------------------
        location /_next/webpack-hmr {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400s;
            proxy_buffering off;
        }

        # -----------------------------------------------------------------
        # Frontend — All remaining routes
        # No caching — always fresh content during development.
        # -----------------------------------------------------------------
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # No caching in development
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }

        # -----------------------------------------------------------------
        # Health Check
        # -----------------------------------------------------------------
        location /nginx-health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }
}
