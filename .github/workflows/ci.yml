# =============================================================================
# YUGI-AI — Continuous Integration Pipeline
# =============================================================================
# Runs on every push and pull request to main/develop branches.
#
# Jobs:
#   1. backend-lint:    Ruff linting + formatting check
#   2. backend-typecheck: MyPy static type analysis
#   3. backend-test:    Pytest with coverage report
#   4. frontend-lint:   ESLint + Prettier check
#   5. frontend-typecheck: TypeScript compilation check
#   6. frontend-build:  Production build verification
#   7. docker-build:    Verify Docker images build successfully
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs when a new commit is pushed to the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ===========================================================================
  # Setup Job
  # ===========================================================================

  check-frontend:
    name: "Check Frontend Exists"
    runs-on: ubuntu-latest
    outputs:
      has_frontend: ${{ steps.check.outputs.has_frontend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Check for frontend directory
        id: check
        run: |
          if [ -d "frontend" ]; then
            echo "has_frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_frontend=false" >> "$GITHUB_OUTPUT"
          fi

  # ===========================================================================
  # Backend Jobs
  # ===========================================================================


  backend-lint:
    name: "Backend — Lint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Ruff linter
        run: ruff check . --output-format=github

      - name: Check Ruff formatting
        run: ruff format --check .

  backend-typecheck:
    name: "Backend — Type Check"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run MyPy
        run: mypy app/ --ignore-missing-imports

  backend-test:
    name: "Backend — Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    # Service containers for integration tests
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: yugi_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: yugi_ai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U yugi_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ENVIRONMENT: testing
      POSTGRES_USER: yugi_test
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: yugi_ai_test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      SECRET_KEY: test-secret-key-not-for-production
      ENCRYPTION_KEY: dGVzdC1lbmNyeXB0aW9uLWtleS1ub3QtZm9yLXByb2R1Y3Rpb24=

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=term-missing --cov-report=xml -v

      - name: Upload coverage report
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # ===========================================================================
  # Frontend Jobs
  # ===========================================================================

  frontend-lint:
    name: "Frontend — Lint"
    runs-on: ubuntu-latest
    needs: [check-frontend]
    if: needs.check-frontend.outputs.has_frontend == 'true'
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          # cache: "npm"
          # cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run ESLint
        run: npm run lint

  frontend-typecheck:
    name: "Frontend — Type Check"
    runs-on: ubuntu-latest
    needs: [check-frontend]
    if: needs.check-frontend.outputs.has_frontend == 'true'
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          # cache: "npm"
          # cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run TypeScript compiler
        run: npx tsc --noEmit

  frontend-build:
    name: "Frontend — Build"
    runs-on: ubuntu-latest
    needs: [check-frontend, frontend-lint, frontend-typecheck]
    if: needs.check-frontend.outputs.has_frontend == 'true'
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          # cache: "npm"
          # cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build production bundle
        env:
          NEXT_PUBLIC_API_URL: http://localhost/api
          NEXT_PUBLIC_WS_URL: ws://localhost/ws
          NEXT_PUBLIC_APP_NAME: YUGI-AI
          NEXT_PUBLIC_APP_VERSION: 0.1.0
        run: npm run build

  # ===========================================================================
  # Docker Build Verification
  # ===========================================================================

  docker-build:
    name: "Docker — Build Images"
    runs-on: ubuntu-latest
    needs: [check-frontend, backend-test]
    if: always() && needs.backend-test.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: production
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        if: needs.check-frontend.outputs.has_frontend == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: production
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
