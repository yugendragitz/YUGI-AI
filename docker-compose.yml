# =============================================================================
# YUGI-AI — Production Docker Compose
# =============================================================================
# This file defines the complete production stack.
# All services run behind NGINX reverse proxy.
#
# Usage:
#   docker compose up --build -d
#
# Services:
#   - nginx:    Reverse proxy (port 80/443)
#   - frontend: Next.js application
#   - backend:  FastAPI application
#   - postgres: PostgreSQL 16 database
#   - redis:    Redis 7 cache/sessions/pub-sub
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # NGINX — Reverse Proxy & SSL Termination
  # Routes traffic to frontend and backend containers.
  # In production, handles SSL, gzip, static file caching, and security headers.
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: yugi-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      # Uncomment when SSL is configured:
      # - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Uncomment when SSL certificates are available:
      # - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    networks:
      - yugi-network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  # ---------------------------------------------------------------------------
  # Frontend — Next.js 15 Application
  # Serves the YUGI-AI interface via server-side rendering.
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: yugi-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost/api}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost/ws}
      - NEXT_PUBLIC_APP_NAME=${NEXT_PUBLIC_APP_NAME:-YUGI-AI}
      - NEXT_PUBLIC_APP_VERSION=${NEXT_PUBLIC_APP_VERSION:-0.1.0}
    expose:
      - "3000"
    networks:
      - yugi-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"

  # ---------------------------------------------------------------------------
  # Backend — FastAPI Application
  # REST API + WebSocket server for all business logic and AI orchestration.
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: yugi-backend
    restart: unless-stopped
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - SECRET_KEY=${SECRET_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - BACKEND_WORKERS=${BACKEND_WORKERS:-2}
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - yugi-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.00"

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — Primary Database
  # Stores users, chats, messages, settings, AI memory, audit logs.
  # Uses a named volume for data persistence across restarts.
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: yugi-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-yugi}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-yugi_ai}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-yugi} -d ${POSTGRES_DB:-yugi_ai}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - yugi-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"
    # Production tuning via command
    command: >
      postgres
        -c shared_buffers=128MB
        -c effective_cache_size=384MB
        -c maintenance_work_mem=64MB
        -c max_connections=100
        -c log_statement=mod
        -c log_min_duration_statement=500

  # ---------------------------------------------------------------------------
  # Redis 7 — Cache, Sessions, Rate Limiting, Pub/Sub
  # Multi-purpose: session store, rate limit counters, event bus, response cache.
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: yugi-redis
    restart: unless-stopped
    # Command configures memory limits and eviction policy
    command: >
      redis-server
        --maxmemory 128mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
        --appendfsync everysec
        ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - yugi-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

# =============================================================================
# Volumes — Persistent data storage
# Named volumes survive container recreation.
# =============================================================================
volumes:
  postgres_data:
    driver: local
    name: yugi-postgres-data
  redis_data:
    driver: local
    name: yugi-redis-data

# =============================================================================
# Networks — Internal service communication
# All services communicate over this bridge network.
# External access is only through NGINX.
# =============================================================================
networks:
  yugi-network:
    driver: bridge
    name: yugi-network
